name: AI-Enhanced CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      enable-ai-scan:
        description: 'Enable AI Security Scan'
        type: boolean
        default: true
      fail-on-critical:
        description: 'Fail build on critical vulnerabilities'
        type: boolean
        default: false
      scan-paths:
        description: 'Paths to scan (comma-separated)'
        type: string
        default: '.'
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  # ========================================================
  # AI Security Scan
  # ========================================================
  ai-security-scan:
    name: AI Security Scan
    if: inputs.enable-ai-scan != false || github.event_name != 'workflow_dispatch'
    uses: org-test-reply-1/platform-ai-workflows/.github/workflows/ai-security-scan.yml@main
    with:
      scan-paths: ${{ inputs.scan-paths || '.' }}
      fail-on-critical: ${{ inputs.fail-on-critical || false }}
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
