name: AI-Enhanced CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      enable-ai-scan:
        description: 'Enable AI Security Scan'
        type: boolean
        default: true
      fail-on-critical:
        description: 'Fail build on critical vulnerabilities'
        type: boolean
        default: false
      scan-paths:
        description: 'Paths to scan (comma-separated)'
        type: string
        default: '.'
  # push:
  #   branches:
  #     - main
  # pull_request:
  #   branches:
  #     - main

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  # ========================================================
  # Prerequisite check — verify COPILOT_ASSIGN_PAT is set
  # ========================================================
  check-prerequisites:
    name: Check Prerequisites
    runs-on: ubuntu-latest
    outputs:
      has-pat: ${{ steps.check-pat.outputs.has-pat }}
    steps:
      - name: Check COPILOT_ASSIGN_PAT
        id: check-pat
        env:
          COPILOT_ASSIGN_PAT: ${{ secrets.COPILOT_ASSIGN_PAT }}
        run: |
          if [ -n "$COPILOT_ASSIGN_PAT" ]; then
            echo "has-pat=true" >> $GITHUB_OUTPUT
          else
            echo "::warning::COPILOT_ASSIGN_PAT secret is not set — AI Security Scan will be skipped."
            echo "has-pat=false" >> $GITHUB_OUTPUT
          fi

  # ========================================================
  # AI Security Scan — Crea issue e assegna al Coding Agent
  # ========================================================
  ai-security-scan:
    name: AI Security Scan
    needs: [check-prerequisites]
    if: needs.check-prerequisites.outputs.has-pat == 'true' && (inputs.enable-ai-scan != false || github.event_name != 'workflow_dispatch')
    uses: org-test-reply-1/platform-ai-workflows/.github/workflows/ai-security-scan.yml@main
    with:
      scan-paths: '.'
      fail-on-critical: ${{ inputs.fail-on-critical || false }}
    permissions:
      contents: read
      issues: write
      actions: read
    secrets:
      COPILOT_ASSIGN_PAT: ${{ secrets.COPILOT_ASSIGN_PAT }}
