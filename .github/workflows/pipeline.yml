name: App Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  issues: write

jobs:
  # ── 1. Build & Test ────────────────────────────────────────────────────────
  build:
    name: .NET Build & Test
    uses: org-test-reply-1/platform-workflows/.github/workflows/ci-dotnet.yml@main
    with:
      project-path: "samples/dotnetapp"
      run-tests: true
      runner: arc-runner-set

# ── 2. Se fallisce → triggera failure handler immediatamente ───────────────
  on-failure:
    name: Trigger Failure Handler
    needs: build
    if: failure()
    uses: org-test-reply-1/platform-ai-workflows/.github/workflows/ai-failure-handler.yml@main
    secrets:
      COPILOT_ASSIGN_PAT: ${{ secrets.COPILOT_ASSIGN_PAT }}
      TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
