name: Copilot PR Notification

on:
  pull_request:
    types: [opened]

jobs:
  notify:
    if: github.event.pull_request.user.login == 'copilot-swe-agent[bot]'
    uses: org-test-reply-1/platform-ai-workflows/.github/workflows/ai-pr-notify.yml@main
    secrets:
      TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
