name: Daily Changes Summary

on:
  schedule:
    - cron: '30 17 * * 1-5'   # Lun-Ven alle 17:30 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  summary:
    uses: org-test-reply-1/platform-ai-workflows/.github/workflows/ai-daily-summary.yml@main
    secrets:
      COPILOT_ASSIGN_PAT: ${{ secrets.COPILOT_ASSIGN_PAT }}
      TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
